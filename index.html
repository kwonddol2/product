<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Bakery Hot 20 Guide | 한국 빵집 가이드</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for cute aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Quicksand:wght@500;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="brochure-container">
        <header>
            <div class="sticker sticker-bread">🍞</div>
            <div class="sticker sticker-heart">❤️</div>
            <h1>Seoul Hot Bakery Guide</h1>
            <p class="subtitle">20 Trendiest Spots to Visit in 2026!</p>
            <div class="language-toggle">
                <button id="btn-en" class="active">English</button>
                <button id="btn-jp">日本語</button>
            </div>
        </header>

        <main id="bakery-grid">
            <!-- Bakery cards will be injected here by JS -->
        </main>

        <section id="partnership-form" class="form-container">
            <div class="form-card">
                <div class="sticker sticker-star">⭐</div>
                <h2 id="form-title">Partnership Inquiry</h2>
                <p id="form-subtitle">Want to collaborate with us? Send us a message!</p>
                
                <form action="https://formspree.io/f/xzdkrbqg" method="POST">
                    <div class="form-group">
                        <label for="name" id="label-name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email" id="label-email">Email Address</label>
                        <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="company" id="label-company">Company / Organization</label>
                        <input type="text" id="company" name="company" placeholder="Your company">
                    </div>
                    <div class="form-group">
                        <label for="message" id="label-message">Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="How can we work together?" required></textarea>
                    </div>
                    <button type="submit" id="btn-submit">Send Inquiry</button>
                </form>
            </div>
        </section>

        <!-- Disqus Comments Section -->
        <section class="comments-container">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                /*
                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://aaa-txzxscwnvw.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>

        <footer>
            <p>&copy; 2026 K-Bakery Guide | Happy Bready Day! 🥐</p>
        </footer>
    </div>

    <!-- Script for rendering and interactions -->
    <script src="main.js"></script>
</body>
</html>
